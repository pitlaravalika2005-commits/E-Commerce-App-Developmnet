<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Colorful E-Commerce Store</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🛒 Colorful E-Commerce Store</h1>
  <p>Best Deals, Best Products</p>
</header>

<section class="products">

  <div class="card">
    <h2>Laptop 💻</h2>
    <p>₹50,000</p>
    <button onclick="addToCart('Laptop',50000)">Add to Cart</button>
  </div>

  <div class="card">
    <h2>Mobile 📱</h2>
    <p>₹20,000</p>
    <button onclick="addToCart('Mobile',20000)">Add to Cart</button>
  </div>

  <div class="card">
    <h2>Headphones 🎧</h2>
    <p>₹3,000</p>
    <button onclick="addToCart('Headphones',3000)">Add to Cart</button>
  </div>

  <div class="card">
    <h2>Watch ⌚</h2>
    <p>₹5,000</p>
    <button onclick="addToCart('Watch',5000)">Add to Cart</button>
  </div>

</section>

<section class="cart">
  <h2>🛍️ Shopping Cart</h2>

  <div id="cartItems"></div>

  <h3>Total: ₹<span id="total">0</span></h3>

  <button class="checkout" onclick="checkout()">Checkout</button>
</section>

<script src="script.js"></script>

</body>
</html>
